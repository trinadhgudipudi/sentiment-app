<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analysis</title>
</head>
<body>
    <h1>Sentiment Analysis App</h1>
    <form method="POST">
        <input type="text" name="text" placeholder="Enter text">
        <button type="submit">Analyze</button>
    </form>

    {% if sentiment %}
        <h2>Result: {{ sentiment }}</h2>
    {% endif %}
</body>
</html>
